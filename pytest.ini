[pytest]
# ─────────────────────────────────────────────────────────────────────────────
# NarayanAstroReader — pytest configuration
# SRS §5.6: kundli-engine and dasha-engine must have ≥80% unit test coverage.
# ─────────────────────────────────────────────────────────────────────────────
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Default: show short tracebacks, verbose output
addopts =
    -v
    --tb=short
    --strict-markers
    --import-mode=importlib

# Async test support
asyncio_mode = auto

# Markers
markers =
    unit: Pure unit tests (no I/O)
    integration: Tests that require a live DB or Redis
    security: Security-focused test cases
    performance: Latency / throughput tests
    critical: Critical-priority tests — must pass before any deploy
    slow: Tests that take > 5 seconds
