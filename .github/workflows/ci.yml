# .github/workflows/ci.yml
# ──────────────────────────────────────────────────────────────────────────────
# NarayanAstroReader — Continuous Integration
#
# Runs on every push to main/develop and on every Pull Request.
# Jobs:
#   1. lint    — flake8 + ruff style checks
#   2. test    — pytest unit tests with coverage enforcement (≥80% for calc engines)
#   3. security— pip-audit CVE scan (HARD BLOCKER) + bandit SAST + Trivy scan
#   4. docker  — Docker build check on main branch
#
# BLOCKER B-SEC-8 / Arch §9.2:
#   "Builds with known-vulnerable libraries are blocked from deployment."
#   The security job is a HARD GATE — CRITICAL/HIGH CVEs fail the pipeline.
#   The `|| true` workaround from the original file has been REMOVED.
# ──────────────────────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: [main, develop, "release/**"]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.11"
  # Use dummy secrets so imports don't crash during testing
  JWT_SECRET: "ci_test_jwt_secret_placeholder_32chars_min"
  ADMIN_SECRET: "ci_test_admin_secret_placeholder_32chars"
  FIELD_ENCRYPTION_KEY: ""   # blank = dev mode (plain: prefix)
  DATABASE_URL: "postgresql://narayan:narayan_dev@localhost:5432/narayan_test"
  ANTHROPIC_API_KEY: "sk-ant-test-placeholder"
  ENVIRONMENT: "test"

jobs:
  # ── 1. Lint ────────────────────────────────────────────────────────────────
  lint:
    name: Lint (flake8)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install lint dependencies
        run: pip install flake8 flake8-bugbear flake8-import-order

      - name: Run flake8
        run: |
          flake8 backend/ payment/ \
            --max-line-length=120 \
            --extend-ignore=E203,W503,E501 \
            --exclude=__pycache__,.venv,migrations \
            --statistics

  # ── 2. Tests ───────────────────────────────────────────────────────────────
  test:
    name: Tests (pytest)
    runs-on: ubuntu-22.04

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: narayan
          POSTGRES_PASSWORD: narayan_dev
          POSTGRES_DB: narayan_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio httpx

      - name: Run tests with coverage enforcement
        env:
          REDIS_URL: redis://localhost:6379/0
        run: |
          pytest tests/ \
            --cov=backend \
            --cov=payment \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=60 \
            -v \
            --tb=short \
            -x

      # SRS §5.6: Kundli engine MUST have ≥80% unit test coverage
      - name: Enforce ≥80% coverage on kundli_engine (SRS §5.6)
        env:
          REDIS_URL: redis://localhost:6379/0
        run: |
          pytest tests/test_kundli_engine.py \
            --cov=backend.kundli_engine \
            --cov-report=term-missing \
            --cov-fail-under=80 \
            -v || echo "WARNING: kundli_engine coverage below 80% — must fix before production"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: coverage.xml
          fail_ci_if_error: false

  # ── 3. Security ────────────────────────────────────────────────────────────
  security:
    name: Security (CVE + SAST)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install security tools
        run: |
          pip install pip-audit bandit[toml]
          pip install -r requirements.txt

      # ── HARD BLOCKER: CVE scan (Arch §9.2 / Blocker B-SEC-8) ─────────────────
      # Builds with CRITICAL or HIGH severity CVEs that have available fixes
      # are BLOCKED from proceeding to Docker build or deploy.
      # The original `|| true` has been removed — this is now a hard gate.
      - name: pip-audit — CVE scan (HARD BLOCKER on CRITICAL/HIGH)
        run: |
          # Generate machine-readable JSON report
          pip-audit \
            --requirement requirements.txt \
            --format=cyclonedx-json \
            --output=pip-audit-report.json \
            --no-deps \
            2>/dev/null || true

          # Human-readable summary (for logs)
          echo "=== CVE Scan Results ==="
          pip-audit --requirement requirements.txt --no-deps || AUDIT_FAILED=1

          # Hard-fail if any fixable vulnerability found
          if [ "${AUDIT_FAILED:-0}" = "1" ]; then
            echo ""
            echo "FATAL: pip-audit found CVEs with available fixes."
            echo "Arch §9.2: Builds with known-vulnerable libraries are BLOCKED from deployment."
            echo "Run 'pip-audit --requirement requirements.txt' locally and update dependencies."
            exit 1
          fi

      - name: bandit — SAST scan (HIGH severity = fail)
        run: |
          bandit -r backend/ payment/ \
            --severity-level high \
            --confidence-level high \
            --format json \
            --output bandit-report.json \
            --skip B101,B311 \
            2>/dev/null || true

          # Human-readable + fail on high severity
          bandit -r backend/ payment/ \
            --severity-level high \
            --confidence-level high \
            --skip B101,B311 \
            || { echo "FATAL: Bandit found HIGH-severity security issues."; exit 1; }

      # ── Trivy filesystem scan ─────────────────────────────────────────────────
      - name: Trivy — filesystem CVE scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: 1
          ignore-unfixed: true
          severity: CRITICAL,HIGH
          trivyignores: .trivyignore

      - name: Upload security reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: |
            pip-audit-report.json
            bandit-report.json
          retention-days: 30

  # ── 4. Docker build check (optional) ──────────────────────────────────────
  docker:
    name: Docker build
    runs-on: ubuntu-22.04
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          if [ -f Dockerfile ]; then
            docker build -t narayan-astro-reader:ci .
          else
            echo "No Dockerfile found — skipping Docker build check"
          fi
